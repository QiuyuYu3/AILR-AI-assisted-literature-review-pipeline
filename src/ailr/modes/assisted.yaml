# Assisted mode - PRISMA-trAIce style.
# AI + 1 human, both blinded (assisted screening).
# AI-extract + human-verify for extraction.
# Any field below can be overridden in the project's lit_review.yaml.

screening:
  workflow: assisted
  target_kappa: 0.7
  calibration:
    fraction: 0.10
    min: 30

extraction:
  workflow: verify
  target_kappa: 0.7
  output_format: with_quotes
  flag_check: true
  calibration:
    fraction: 0.10
    min: 10
